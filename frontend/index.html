<!DOCTYPE html>
<html>
<head>
  <title>On-Chain Market Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>On-Chain Market Monitor</h1>
  <div id="grid">
    <div class="card"><h2>Spot Price (Uniswap)</h2><p id="spot">--</p></div>
    <div class="card"><h2>Oracle Price (Chainlink)</h2><p id="oracle">--</p></div>
    <div class="card"><h2>TWAP (5m)</h2><p id="twap">--</p></div>
    <div class="card"><h2>Curve Imbalance</h2><p id="imbalance">--</p></div>
    <div class="card"><h2>Stablecoin Peg</h2><p id="peg">--</p></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
