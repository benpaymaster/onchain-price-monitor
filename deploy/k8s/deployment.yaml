apiVersion: apps/v1
kind: Deployment
metadata:
	name: backend
spec:
	replicas: 2
	selector:
		matchLabels:
			app: backend
	template:
		metadata:
			labels:
				app: backend
		spec:
			containers:
			- name: backend
				image: backend:latest
				ports:
				- containerPort: 5000
				envFrom:
				- configMapRef:
						name: backend-config
				resources:
					limits:
						memory: "512Mi"
						cpu: "500m"
					requests:
						memory: "256Mi"
						cpu: "250m"
				readinessProbe:
					httpGet:
						path: /health
						port: 5000
					initialDelaySeconds: 5
					periodSeconds: 10
				livenessProbe:
					httpGet:
						path: /health
						port: 5000
					initialDelaySeconds: 15
					periodSeconds: 20
