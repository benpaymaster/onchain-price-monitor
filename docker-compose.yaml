version: '3.8'
services:
  backend:
    build: ./backend/python
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    depends_on:
      - redis
      - kafka
    volumes:
      - ./backend/python:/app
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  go-health:
    build: ./backend/go
    ports:
      - "8080:8080"
  dashboard:
    build: ./frontend/react-dashboard
    ports:
      - "3000:80"
  kafka:
    image: bitnami/kafka:3.6.0
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
  zookeeper:
    image: bitnami/zookeeper:3.8.1
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
  alertmanager:
    image: prom/alertmanager:v0.26.0
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
  backend:
    build: ./backend/python
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    depends_on:
      - redis
      - kafka
    volumes:
      - ./backend/python:/app
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  go-health:
